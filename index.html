<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VIP E-Commerce Store</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="e-commerce.css">
</head>
<body>


<header>
    <div class="logo">VIP Store</div>
    <nav>
        <a href="#">Home</a>
        <a href="#">Products</a>
        <a href="#">Cart</a>
        <a href="#">Contact</a>
    </nav>
</header>


<section class="hero">
    <h1>Welcome to VIP E-Commerce</h1>
    <p>Best Products | Best Prices</p>
    <button>Shop Now</button>
</section>


<section class="products">
    <h2>Our Products</h2>

    <div class="product-box">
        <img src="./watch.png">
        <h3>Watch</h3>
        <p>Rs. 2500</p>
        <button onclick="addToCart()">Add to Cart</button>
    </div>

    <div class="product-box">
        <img src="./shooes.webp">
        <h3>Shooes</h3>
        <p>Rs. 3200</p>
        <button onclick="addToCart()">Add to Cart</button>
    </div>

    <div class="product-box">
        <img src="./elegant-perfume-bottle-stockcake.webp">
        <h3>Perfume</h3>
        <p>Rs. 1800</p>
        <button onclick="addToCart()">Add to Cart</button>
    </div>

    <div class="product-box">
        <img src="./airpods.png">
        <h3>Airpods</h3>
        <p>Rs. 4000</p>
        <button onclick="addToCart()">Add to Cart</button>
    </div>
</section>


<footer>
    <p>© 2026 VIP Store | All Rights Reserved</p>
</footer>

<script src="script.js"></script>
</body>
</html>
